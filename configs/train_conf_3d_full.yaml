dataset:
  path: data/showcase/jtvae_showcase_6000.csv
  mol_column: mol
  smiles_column: smiles
  target_columns: [homo, lumo, gap]
  val_fraction: 0.1

model:
  hidden_channels: 256
  num_filters: 256
  num_interactions: 8
  num_gaussians: 120
  cutoff: 10.0
  readout: add
  head_dropout: 0.1
  interaction_dropout: 0.1

training:
  n_models: 3
  epochs: 240
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0
  patience: 30
  scheduler_patience: 20
  device: auto
  use_amp: true
  compile: false
  compile_mode: default
  compile_fullgraph: false
  save_dir: models/surrogate_3d_full
  live_dashboard:
    enabled: true
    path: experiments/showcase/schnet_full_live_dashboard.html
    refresh_ms: 900
    local_view_enabled: true
    local_view_host: 127.0.0.1
    local_view_port: 8772
    open_browser: true
