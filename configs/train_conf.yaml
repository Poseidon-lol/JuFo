dataset:
  path: data/raw/opv_db.csv
  target_columns: [homo, lumo, gap]
  val_fraction: 0.1
surrogate:
  device: cuda:0
  use_amp: true
  compile: true
  compile_mode: default
  compile_fullgraph: false
  n_models: 5
  epochs: 180
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  patience: 24
  scheduler_patience: 12
  dropout: 0.12
  loss: mae
  hidden_dim: 320
  message_layers: 7
  readout: mlp
  readout_dim: 384
  pooling: mean
  grad_clip: 1.0
  mc_dropout_samples: 4
  calibrate: true
  save_dir: models/surrogate_heavy
