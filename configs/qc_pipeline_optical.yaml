geometry:
  force_field: MMFF94
  max_iterations: 300
  embed_tries: 20
  random_seed: 1337
  optimize: true
  use_etkdg: true
  conformers: 10
  refine_forcefield: MMFF94
  final_opt_forcefield: MMFF94
  final_opt_iterations: 200
  rms_force_thresh: 0.5
  pick_lowest_energy: true
quantum:
  engine: orca
  executable: /workspace/orca_6_1_1_linux_x86-64_shared_openmpi418_avx2/orca
  method: B3LYP
  basis: def2-SVP
  level_of_theory: B3LYP/def2-SVP
  dispersion: D3BJ
  solvent_model: CPCM
  solvent: chloroform
  properties: [HOMO, LUMO, gap, lambda_max, oscillator_strength]
  charge: 0
  multiplicity: 1
  keywords:
    nprocs: 2
    maxcore: 1200
    tddft_nroots: 12
  environment:
    OMP_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
fallbacks:
  - engine: orca
    method: PBE0
    basis: def2-SVP
    dispersion: D3BJ
  - engine: xtb
    method: GFN2-xTB
    basis: null
    dispersion: null
max_workers: 10
poll_interval: 20.0
work_dir: /workspace/qc_runs_optical
cleanup_workdir: true
store_metadata: true
allow_fallback: true
walltime_limit: 1800
