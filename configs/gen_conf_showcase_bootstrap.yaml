dataset:
  path: data/processed/jtvae_showcase_thin.csv
  target_columns: [homo, lumo, gap]
  max_fragments: 12
  fragment_min_count: 1
  max_heavy_atoms: 70
  fragment_method: brics
  min_fragment_heavy_atoms: 1

model:
  z_dim: 48
  hidden_dim: 128
  encoder_layers: 3
  cond_dim: 3

training:
  epochs: 8
  batch_size: 24
  lr: 0.0006
  kl_weight: 0.2
  property_loss_weight: 0.05
  adjacency_loss_weight: 0.8
  scheduler_patience: 3
  scheduler_factor: 0.6
  device: auto
  use_amp: false
  compile: false
  compile_mode: default
  compile_fullgraph: false
  max_grad_norm: 0.7
  live_decode:
    enabled: false

save_dir: models/generator_showcase_bootstrap
