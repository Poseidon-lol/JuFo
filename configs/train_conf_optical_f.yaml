dataset:
  path: data/raw/QM_symex
  source: qmsymex_xyz
  target_columns: [oscillator_strength]
  transition_mode: best_f
  dedupe_smiles: true
  progress_every: 20000
  charge: 0
  max_files: null
  val_fraction: 0.1

model:
  hidden_channels: 192
  num_filters: 192
  num_interactions: 6
  num_gaussians: 96
  cutoff: 10.0
  readout: add
  head_dropout: 0.1
  interaction_dropout: 0.1

training:
  n_models: 1
  epochs: 180
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.00001
  patience: 24
  scheduler_patience: 10
  device: cuda:0
  use_amp: true
  num_workers: 8
  pin_memory: true
  grad_clip: 2.0
  loss: smooth_l1
  seed: 1337
  compile: true
  compile_mode: default
  compile_fullgraph: false
  save_dir: models/surrogate_optical_f
  live_dashboard:
    enabled: true
    path: experiments/optical/schnet_optical_f_live_dashboard.html
    refresh_ms: 900
    local_view_enabled: true
    local_view_host: 127.0.0.1
    local_view_port: 8774
    open_browser: true
