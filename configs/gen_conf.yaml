dataset:
  path: data/raw/opv_db.csv
  target_columns: [homo, lumo, gap]
  max_fragments: 24
  fragment_min_count: 1
  max_heavy_atoms: null
  fragment_method: brics
  min_fragment_heavy_atoms: 3
model:
  z_dim: 128
  hidden_dim: 384
  cond_dim: 3
training:
  epochs: 200
  batch_size: 64
  lr: 0.0005
  kl_weight: 0.3
  property_loss_weight: 0.1
  adjacency_loss_weight: 1.0
  scheduler_patience: 15
  scheduler_factor: 0.5
  device: auto
  use_amp: true
  compile: true
  compile_mode: default
  compile_fullgraph: false
  max_grad_norm: 1.0
save_dir: models/generator
