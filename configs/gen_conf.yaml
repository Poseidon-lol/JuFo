dataset:
  path: data/raw/opv_db.csv
  target_columns: [homo, lumo, gap, optical_lumo, spectral_overlap]
  max_fragments: 32
  fragment_min_count: 1
  max_heavy_atoms: 100
  fragment_method: brics
  min_fragment_heavy_atoms: 3
model:
  z_dim: 160
  hidden_dim: 512
  cond_dim: 5
training:
  epochs: 260
  batch_size: 96
  lr: 0.0003
  kl_weight: 0.35
  property_loss_weight: 0.15
  adjacency_loss_weight: 1.0
  scheduler_patience: 20
  scheduler_factor: 0.5
  device: cuda:0
  use_amp: true
  compile: true
  compile_mode: default
  compile_fullgraph: false
  max_grad_norm: 1.0
save_dir: models/generator_heavy
