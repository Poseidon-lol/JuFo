loop:
  objective_mode: red
  objective_profile_path: configs/objectives.yaml
  device: cuda:0
  surrogate_device: cuda:0
  generator_device: cuda:0
  batch_size: 16
  target_columns: [homo, lumo, gap]
  maximise: [false, true, false]
  generator_samples: 256
  generator_attempts: 12
  results_dir: experiments/active_runs_novel
  diversity_threshold: 0.75
  property_aliases:
    HOMO: homo
    LUMO: lumo
    gap: gap
    lambda_max: lambda_max_nm
    oscillator_strength: oscillator_strength
  max_pool_eval: null
  predict_batch_size: 768
  predict_mc_samples: 1
  optical_surrogate_dir: null
  optical_score_weight: 0.0
  optical_target_columns: [lambda_max_nm]
  optical_targets: [680.0]
  optical_tolerances: [60.0]
  optical_weights: [1.0]
  optical_beta: 0.0
  optical_weight_schedule:
    - { until_iteration: 3, weight: 0.10 }
    - { until_iteration: 7, weight: 0.30 }
    - { until_iteration: 9999, weight: 0.55 }
  optical_predict_batch_size: null
  optical_predict_mc_samples: null
  min_labels_for_optical: 1000
  optical_retrain_every: 2
  optical_retrain_min_labels: 1000
  optical_retrain_val_fraction: 0.1
  optical_retrain_on_success_only: true
  optical_incremental_path: data/processed/opv_optical_incremental.csv
  optical_incremental_dedupe_on: [smiles]
  optical_incremental_require_all_targets: true
  oscillator_surrogate_dir: null
  oscillator_score_weight: 0.0
  oscillator_target_columns: [oscillator_strength]
  oscillator_targets: [0.20]
  oscillator_tolerances: [0.10]
  oscillator_weights: [1.0]
  oscillator_beta: 0.0
  oscillator_predict_batch_size: null
  oscillator_predict_mc_samples: null
  min_labels_for_oscillator: 1000
  oscillator_retrain_every: 2
  oscillator_retrain_min_labels: 1000
  oscillator_retrain_val_fraction: 0.1
  oscillator_retrain_on_success_only: true
  red_score_columns: [lambda_max_nm, oscillator_strength, gap]
  red_score_targets: [680.0, 0.25, 1.8]
  red_score_tolerances: [60.0, 0.08, 0.45]
  red_score_weights: [1.2, 1.6, 0.8]
  red_score_missing_penalty: 3.0
  red_score_pass_threshold: -2.0
  red_score_require_qc_success: true
  early_stop_no_improve_iterations: 0
  early_stop_min_delta: 0.0
  export_top_k: 50
  export_sort_column: red_score
  export_require_qc_success: true
  export_require_red_pass: true
  export_top_candidates_path: experiments/active_runs_novel/top_red_candidates.csv
  predict_num_workers: 12
  predict_pin_memory: true
  predict_amp: true
  max_generated_heavy_atoms: null
  max_generated_smiles_len: null
  generated_smiles_len_factor: null
  exclude_smiles_paths:
    - data/raw/opv_db.csv
    - experiments/active_runs/active_learning_history.csv
    - Rotlichtabsober.csv
  live_dashboard:
    enabled: false
    path: experiments/active_runs_novel/active_loop_live_dashboard.html
    refresh_ms: 1200
    selected_top_k: 8
    local_view_enabled: false
    local_view_host: 127.0.0.1
    local_view_port: 8773
    open_browser: false
  save_diagnostics: false
  diagnostics_every: 0
  diagnostics_max_points: 12000
  auto_relax_filters: true
  require_conjugation: true
  min_conjugated_bonds: 8
  min_alternating_conjugated_bonds: 5
  min_pi_conjugated_fraction: 0.5
  min_aromatic_rings: 2
  require_neutral: true
  max_charged_atoms: 0
  max_rotatable_bonds: 10
  max_rotatable_bonds_conjugated: 2
  max_branch_points: 4
  max_branch_degree: 3
  property_filters:
    homo: [-6.1, -4.9]
    lumo: [-3.8, -2.4]
    gap: [1.2, 2.8]
  qc_extra_properties: [lambda_max, oscillator_strength]
  min_lambda_max_nm: 650.0
  min_oscillator_strength: 0.20
  generator_refresh:
    epochs: 2
    batch_size: 32
    lr: 0.0001
    kl_weight: 0.5
    property_weight: 0.1
    adj_weight: 1.0
    max_heavy_atoms: null
    save_dir: experiments/generator_refresh
  rl:
    enabled: false
    every_n_iterations: 1
    steps_per_update: 1
    batch_size: 64
    lr: 0.00001
    actor_lr: 0.000015
    critic_lr: 0.00003
    algorithm: policy_gradient
    entropy_weight: 0.01
    entropy_weight_start: 0.03
    entropy_weight_end: 0.005
    entropy_decay_updates: 200
    baseline_momentum: 0.9
    reward_clip: 5.0
    reward_running_norm: true
    reward_norm_eps: 1.0e-6
    reward_norm_clip: 5.0
    warmup_iterations: 0
    max_grad_norm: 1.0
    checkpoint_every: 1
    value_loss_weight: 0.5
    anchor_weight: 0.02
    ppo_clip_ratio: 0.2
    ppo_clip_ratio_min: 0.05
    ppo_clip_ratio_max: 0.4
    ppo_epochs: 4
    ppo_minibatch_size: 64
    ppo_target_kl: 0.03
    ppo_value_clip_range: 0.2
    ppo_adaptive_kl: true
    ppo_adaptive_kl_high_mult: 1.5
    ppo_adaptive_kl_low_mult: 0.5
    ppo_lr_down_factor: 0.5
    ppo_lr_up_factor: 1.05
    ppo_clip_down_factor: 0.9
    ppo_clip_up_factor: 1.02
    ppo_actor_lr_min: 0.000001
    ppo_actor_lr_max: 0.0002
    normalize_advantage: true
    use_qc_top_k: true
    qc_top_k: 8
assemble:
  beam_width: 4
  topk_per_node: 4
  adjacency_threshold: 0.45
  max_tree_nodes: 10
  score_partial_assembly: false
  max_fragment_heavy_atoms: null
  max_fragment_length: null
  max_total_heavy_atoms: null
acquisition:
  kind: target
  beta: 0.0
  targets: [-5.3, -3.1, 1.6]
  tolerances: [0.3, 0.4, 0.5]
  weights: [0.8, 0.8, 1.4]
  maximise: [false, true, false]
scheduler:
  max_iterations: 12
  surrogate_retrain_every: 1
  generator_refresh_every: 0
data:
  labelled: data/processed/opv_seed_500.csv
  pool: data/processed/empty_pool.csv
  fragment_vocab: models/generator/fragment_vocab.json
qc:
  pipeline_config: configs/qc_pipeline.yaml
  result_store: data/processed/qc_results.csv
