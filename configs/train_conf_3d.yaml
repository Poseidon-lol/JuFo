dataset:
  path: data/showcase/jtvae_showcase_6000.csv
  mol_column: mol
  smiles_column: smiles
  target_columns: [homo, lumo, gap, optical_lumo, spectral_overlap]
  val_fraction: 0.1

model:
  hidden_channels: 128
  num_filters: 128
  num_interactions: 6
  num_gaussians: 50
  cutoff: 10.0
  readout: add

training:
  epochs: 120
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0
  patience: 16
  device: auto
  save_dir: models/surrogate_3d
  live_dashboard:
    enabled: true
    path: experiments/showcase/schnet_live_dashboard.html
    refresh_ms: 900
    local_view_enabled: true
    local_view_host: 127.0.0.1
    local_view_port: 8771
    open_browser: true
