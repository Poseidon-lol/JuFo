dataset:
  path: data/showcase/jtvae_showcase_6000.csv
  mol_column: mol
  smiles_column: smiles
  target_columns: [homo, lumo, gap]
  val_fraction: 0.1

model:
  hidden_channels: 64
  num_filters: 64
  num_interactions: 3
  num_gaussians: 32
  cutoff: 8.0
  readout: add
  head_dropout: 0.0
  interaction_dropout: 0.0

training:
  n_models: 1
  epochs: 1
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0
  patience: 5
  scheduler_patience: 3
  device: cuda
  use_amp: true
  compile: false
  compile_mode: default
  compile_fullgraph: false
  save_dir: models/smoke/surrogate_3d_full_cuda
  live_dashboard:
    enabled: false
    open_browser: false
