dataset:
  path: data/showcase/jtvae_showcase_seed_300.csv
  target_columns: [homo, lumo, gap]
  max_fragments: 12
  fragment_min_count: 1
  max_heavy_atoms: 80
  fragment_method: brics
  min_fragment_heavy_atoms: 1
model:
  z_dim: 64
  hidden_dim: 128
  encoder_layers: 4
  cond_dim: 3
training:
  epochs: 1
  batch_size: 32
  lr: 0.0003
  kl_weight: 0.2
  property_loss_weight: 0.08
  adjacency_loss_weight: 0.8
  scheduler_patience: 2
  scheduler_factor: 0.6
  device: cuda
  use_amp: false
  compile: false
  compile_mode: default
  compile_fullgraph: false
  max_grad_norm: 0.5
  live_decode:
    enabled: false
save_dir: models/smoke/generator_cuda
